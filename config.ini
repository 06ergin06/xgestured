[gestures_3]
swipe_up_3 = dbus-send --session --dest=org.gnome.Shell --type=method_call /org/gnome/Shell org.freedesktop.DBus.Properties.Set string:org.gnome.Shell string:OverviewActive variant:boolean:true
#swipe_up_3 = wmctrl -k on
swipe_down_3 = dbus-send --session --dest=org.gnome.Shell --type=method_call /org/gnome/Shell org.freedesktop.DBus.Properties.Set string:org.gnome.Shell string:OverviewActive variant:boolean:false
swipe_left_3 = qdbus org.kde.kglobalaccel /component/kwin invokeShortcut "Switch One Desktop to the Left"
swipe_right_3 = qdbus org.kde.kglobalaccel /component/kwin invokeShortcut "Switch One Desktop to the Right"

[gestures_4]
swipe_up_4 = dolphin
swipe_down_4 = firefox
swipe_left_4 = qdbus org.kde.kglobalaccel /component/kwin invokeShortcut "Switch One Desktop to the Left"
swipe_right_4 = qdbus org.kde.kglobalaccel /component/kwin invokeShortcut "Switch One Desktop to the Right"
